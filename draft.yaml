routes:
  api:
    GET email/verify/{id}/{hash} verify:
      uses: Auth/AuthenticatedSessionController@verifyEmail
      middleware:
        - "auth:sanctum"
        - "signed"

    POST email/verification-notification verification.send:
      uses: Auth/AuthenticatedSessionController@sendVerificationEmail
      middleware:
        - "auth:sanctum"

    POST forgot-password api.forgot-password:
      uses: Auth/AuthenticatedSessionController@forgotPassword

    POST reset-password api.reset-password:
      uses: Auth/AuthenticatedSessionController@resetPassword

    POST change-password api.change-password:
      uses: Auth/AuthenticatedSessionController@changePassword
      middleware:
        - "auth:sanctum"

controllers:
  RolesController:
    index:
      return: all
    store:
      validate:
        - nom
      save:
        - nom
    show:
      find: id
    update:
      validate:
        - nom
      update:
        - nom
    destroy:
      delete: role

  CategorieController:
    index:
      return: all
    store:
      validate:
        - nom
      save:
        - nom
    show:
      find: id
    update:
      validate:
        - nom
      update:
        - nom
    destroy:
      delete: categorie

models:
  Roles:
    nom: string

  Categories:
    nom: string
