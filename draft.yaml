controllers:
  Auth/AuthenticatedSession:
    methods:
      verifyEmail:
        uri: 'email/verify/{id}/{hash}'
        method: get
        name: verification.verify
        middleware: ['auth:sanctum', 'signed']
        request:
          id: integer
          hash: string
        response: 200

      sendVerificationEmail:
        uri: 'email/verification-notification'
        method: post
        name: verification.send
        middleware: ['auth:sanctum']
        response: 200

      forgotPassword:
        uri: 'forgot-password'
        method: post
        name: api.forgot-password
        request:
          email: string email
        response: 200

      resetPassword:
        uri: 'reset-password'
        method: post
        name: api.reset-password
        request:
          email: string email
          token: string
          password: string
          password_confirmation: string
        response: 200

      changePassword:
        uri: 'change-password'
        method: post
        name: api.change-password
        middleware: ['auth:sanctum']
        request:
          current_password: string
          password: string
          password_confirmation: string
        response: 200

  Roles:
    resource: api
    model: Roles
    middleware: ['auth:sanctum']

  Categorie:
    resource: api
    model: Categories
    middleware: ['auth:sanctum']

models:
  Roles:
    nom: string
   

  Categories:
    nom: string
   
